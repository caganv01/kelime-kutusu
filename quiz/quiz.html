<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Quiz — Kelime Kutusu</title>
<style>
  :root {
    --bg: #1c1c1e; --bg2: #2c2c2e; --line: #3a3a3c;
    --text: #f2f2f7; --dim: #8e8e93; --accent: #64d2ff;
    --blue: #0a84ff; --ok: #30d158; --no: #ff453a;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .app { width: 100%; max-width: 460px; }

  .ust {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--dim); margin-bottom: 10px;
  }
  .cubuk { height: 3px; background: var(--bg2); border-radius: 2px; overflow: hidden; }
  .dolu  { height: 100%; background: var(--accent); width: 0; transition: width .25s; }

  .soru {
    text-align: center; padding: 44px 0 36px;
    font-size: 40px; font-weight: 600; letter-spacing: -.02em;
    word-break: break-word;
  }
  .baglam {
    text-align: center; font-size: 13px; color: var(--dim);
    line-height: 1.5; margin: -20px 0 28px; font-style: italic;
  }

  .secenekler { display: grid; gap: 8px; }
  .sec {
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; font: 15px inherit; text-align: left;
    cursor: pointer; transition: background .1s, border-color .1s;
  }
  .sec:hover:not(:disabled) { background: #3a3a3c; }
  .sec:disabled { cursor: default; }
  .sec.dogru  { border-color: var(--ok); background: rgba(48,209,88,.14); color: var(--ok); }
  .sec.yanlis { border-color: var(--no); background: rgba(255,69,58,.14); color: var(--no); }
  .sec.solgun { opacity: .35; }

  .devam {
    margin-top: 14px; width: 100%;
    background: var(--blue); color: #fff; border: 0; border-radius: 10px;
    padding: 13px; font: 600 14px inherit; cursor: pointer;
  }
  .devam:hover { background: #0071e3; }

  .orta { text-align: center; padding: 40px 0; }
  .buyuk { font-size: 44px; font-weight: 600; letter-spacing: -.02em; }
  .alt { font-size: 14px; color: var(--dim); margin-top: 8px; line-height: 1.6; }
  .gizli { display: none; }
</style>
</head>
<body>
  <div class="app">
    <div id="oyun" class="gizli">
      <div class="ust">
        <span id="ilerleme"></span>
        <span id="skor"></span>
      </div>
      <div class="cubuk"><div class="dolu" id="dolu"></div></div>

      <div class="soru" id="soru"></div>
      <div class="baglam" id="baglam"></div>
      <div class="secenekler" id="secenekler"></div>
      <button class="devam gizli" id="devam">Devam</button>
    </div>

    <div id="mesaj" class="orta gizli">
      <div class="buyuk" id="mBaslik"></div>
      <div class="alt" id="mAlt"></div>
    </div>
  </div>

<script src="../lib/dexie.js"></script>
<script src="../db.js"></script>
<script src="quiz.js"></script>
</body>
</html>
